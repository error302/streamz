version: "3.8"

services:
  # ---- Redis - Job queue & caching ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- PostgreSQL - Primary database ----
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: streamz
      POSTGRES_PASSWORD: streamz
      POSTGRES_DB: streamz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamz -d streamz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- MinIO - S3-compatible R2 emulator ----
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- MinIO Setup - Create bucket on first run ----
  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/streamz --ignore-existing;
      mc anonymous set public local/streamz;
      echo 'MinIO bucket created and set to public';
      "

  # ---- Capture Worker - Stream capture & chat logging ----
  capture-worker:
    build:
      context: .
      dockerfile: workers/capture/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://streamz:streamz@postgres:5432/streamz?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: streamz
      S3_REGION: auto
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      NODE_ENV: development
    restart: unless-stopped

  # ---- Highlight Worker - Clip detection & extraction ----
  highlight-worker:
    build:
      context: .
      dockerfile: workers/highlight/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://streamz:streamz@postgres:5432/streamz?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: streamz
      S3_REGION: auto
      NODE_ENV: development
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  minio_data:
