# ============================================
# StreamZ - Fly.io Deployment Configuration
# ============================================
# Deploy workers to Fly.io for production.
# Copy this template and adjust for each worker service.

app = "streamz"
primary_region = "sjc"

[build]
  # Set Dockerfile path per worker
  dockerfile = "workers/capture/Dockerfile"

[env]
  NODE_ENV = "production"
  REDIS_HOST = "streamz-redis.internal"
  REDIS_PORT = "6379"

[deploy]
  strategy = "rolling"

# ---- Secrets (set via `fly secrets set`) ----
# DATABASE_URL
# REDIS_PASSWORD
# S3_ENDPOINT
# S3_ACCESS_KEY_ID
# S3_SECRET_ACCESS_KEY
# S3_BUCKET
# OPENROUTER_API_KEY
# TWITCH_CLIENT_ID
# TWITCH_CLIENT_SECRET
# TWITCH_EVENTSUB_SECRET

# ---- Scaling ----
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# ---- Resources ----
# capture-worker: 1GB RAM, 2 vCPU (CPU-intensive yt-dlp)
# highlight-worker: 2GB RAM, 2 vCPU (FFmpeg + analysis)
# optimizer-worker: 512MB RAM, 1 vCPU (API calls only)
# publisher-worker: 256MB RAM, 1 vCPU (API calls only)

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

